<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Atividades Makários</title>

  <!-- Open Graph / WhatsApp -->
  <meta property="og:title" content="Atividades Makários" />
  <meta property="og:description" content="Exercícios, avaliações e conteúdos da Escola Makários." />
  <meta property="og:image" content="https://makarios2026.netlify.app/preview.png" />
  <meta property="og:url" content="https://makarios2026.netlify.app/" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Atividades Makários" />
  <meta name="twitter:description" content="Exercícios, avaliações e conteúdos da Escola Makários." />
  <meta name="twitter:image" content="https://makarios2026.netlify.app/preview.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --blue: #2E7FBF;
      --text: #16192b;
      --muted: #6c7484;
      --border: #d7e0ea;
      --bg: #f7f9fc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Barlow", sans-serif;
      background: white;
      color: var(--text);
    }

    .hero {
      background: var(--blue);
      padding: 64px 20px 56px;
      text-align: center;
    }

    .hero img {
      width: min(520px, 92vw);
      margin-bottom: 28px;
    }

    .hero h1 {
      color: white;
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1;
      margin-bottom: 18px;
      font-weight: 800;
    }

    .hero p {
      color: rgba(255,255,255,.82);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 640px;
      margin: 0 auto;
    }

    .main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .section-title {
      text-align: center;
      margin-bottom: 24px;
      font-size: 13px;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 800;
      color: #9aa7b8;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: .2s ease;
      background: white;
    }

    .card:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(46,127,191,.10);
    }

    .number {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: var(--blue);
      color: white;
      font-size: 1.4rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 4px;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .meta {
      color: var(--muted);
      font-size: .95rem;
    }

    .arrow {
      color: var(--blue);
      font-size: 1.8rem;
      font-weight: 800;
    }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 28px 16px;
      color: #9ba6b4;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .hero {
        padding-top: 54px;
      }

      .card {
        padding: 18px;
      }

      .number {
        width: 50px;
        height: 50px;
        border-radius: 16px;
      }

      .title {
        font-size: 1.05rem;
      }
    }
  </style>
</head>

<body>

  <header class="hero">
    <img src="logo-makarios-oficial-azul.png" alt="Makários" />

    <h1>Atividades Makários</h1>

    <p>
      Exercícios, avaliações e conteúdos da Escola Makários.
    </p>
  </header>

  <main class="main">

    <div class="section-title">
      Escolha seu volume
    </div>

    <div class="cards">

      <a class="card" href="essencia.html">
        <div class="number">1</div>

        <div class="content">
          <div class="label">Volume 1</div>
          <div class="title">Essência</div>
          <div class="meta">
            Exercícios e avaliações
          </div>
        </div>

        <div class="arrow">→</div>
      </a>

      <a class="card" href="caminho.html">
        <div class="number">2</div>

        <div class="content">
          <div class="label">Volume 2</div>
          <div class="title">Caminho</div>
          <div class="meta">
            Exercícios e avaliações
          </div>
        </div>

        <div class="arrow">→</div>
      </a>

      <a class="card" href="voz.html">
        <div class="number">3</div>

        <div class="content">
          <div class="label">Volume 3</div>
          <div class="title">Voz</div>
          <div class="meta">
            Exercícios e avaliações
          </div>
        </div>

        <div class="arrow">→</div>
      </a>

    </div>

  </main>

  <footer>
    Escola Makários · 2026
  </footer>

</body>
</html>
